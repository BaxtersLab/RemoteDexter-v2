<!doctype html>
<html>
<head><meta charset="utf-8"><title>Timeline Viewer</title></head>
<body>
<h3>Timeline Viewer (minimal)</h3>
<input type="file" id="f" accept="application/json" />
<div>
  <label>Page size: <input id="pageSize" type="number" value="10" style="width:60px"/></label>
  <button id="prev">Prev</button>
  <button id="next">Next</button>
  <span id="pageInfo"></span>
</div>
<pre id="out" style="white-space:pre-wrap; border:1px solid #ccc; padding:8px; max-height:400px; overflow:auto;"></pre>
<script>
let jsonData = null;
let page = 1;
function renderPage(){
  if(!jsonData) return;
  const ps = parseInt(document.getElementById('pageSize').value||10,10);
  const trace = jsonData.trace || jsonData;
  const total = trace.length || 0;
  const start = (page-1)*ps;
  const end = Math.min(start+ps, total);
  const slice = trace.slice(start,end);
  document.getElementById('out').textContent = JSON.stringify({page, pageSize:ps, total, items:slice}, null, 2);
  document.getElementById('pageInfo').textContent = ` Showing ${start+1}-${end} of ${total}`;
}

document.getElementById('prev').addEventListener('click', ()=>{ if(page>1){page--; renderPage();}});
document.getElementById('next').addEventListener('click', ()=>{ page++; renderPage();});

document.getElementById('f').addEventListener('change', function(e){
  const file = e.target.files[0];
  if(!file) return;
  const r = new FileReader();
  r.onload = function(){
    try{ jsonData = JSON.parse(r.result); page=1; renderPage(); }catch(err){document.getElementById('out').textContent = 'Invalid JSON';}
  };
  r.readAsText(file);
});
</script>
</body>
</html>
