<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Timeline Viewer</title>
  <style>
    body{font-family:system-ui,Segoe UI,Arial,Helvetica,sans-serif;margin:18px}
    .controls{display:flex;gap:8px;align-items:center;margin-bottom:8px}
    input[type=number]{width:72px}
    #out{white-space:pre-wrap;border:1px solid #ccc;padding:8px;max-height:520px;overflow:auto;background:#f9f9f9}
    .muted{color:#666;font-size:0.9em}
    button:disabled{opacity:0.45}
    .highlight{background:#fff3a0;transition:background 0.2s ease}
  </style>
</head>
<body>
<h3>Timeline Viewer</h3>
<input type="file" id="f" accept="application/json" />
<div class="controls">
  <label>Page size: <input id="pageSize" type="number" value="10" min="1"/></label>
  <button id="prev">◀ Prev</button>
  <button id="next">Next ▶</button>
  <label>Go to page: <input id="goto" type="number" min="1" style="width:72px"/></label>
  <button id="go">Go</button>
  <label>Filter: <input id="filterInput" type="text" placeholder="type to highlight rows" style="width:220px"/></label>
  <label><input id="globalFilter" type="checkbox"/> Global Filter</label>
  <button id="copy">Copy JSON</button>
  <button id="download">Download Page</button>
  <button id="toggleView">Table View</button>
  <span id="pageInfo" class="muted"></span>
</div>
<div id="tableWrap" style="display:none;max-height:520px;overflow:auto;margin-bottom:8px"></div>
<pre id="out"></pre>
<script>
let jsonData = null;
let page = 1;
let fullTrace = [];
let lastRenderedItems = [];
let lastPageStart = 0;

function clamp(v, a, b){ return Math.max(a, Math.min(b, v)); }

function renderPage(){
  if(!jsonData) return;
  const ps = clamp(parseInt(document.getElementById('pageSize').value||10,10), 1, 1000);
  const trace = Array.isArray(jsonData) ? jsonData : (jsonData.trace || jsonData.items || []);
  fullTrace = trace;
  const total = trace.length || 0;
  const maxPage = Math.max(1, Math.ceil(total/ps));
  page = clamp(page, 1, maxPage);
  const start = (page-1)*ps;
  const end = Math.min(start+ps, total);
  const slice = trace.slice(start,end);
  function tryFormatTs(val){
    try{
      if(val==null) return null;
      if(typeof val === 'number') return new Date(val*1000).toISOString();
      if(typeof val === 'string'){
        const n = parseFloat(val);
        if(!isNaN(n) && String(n) === val) return new Date(n*1000).toISOString();
        const d = new Date(val);
        if(!isNaN(d)) return d.toISOString();
        return val;
      }
      if(val instanceof Date) return val.toISOString();
      return String(val);
    }catch(e){return String(val)}
  }

  function formatRelative(val){
    try{
      let d = null;
      if(typeof val === 'number') d = new Date(val*1000);
      else d = new Date(val);
      if(isNaN(d)) return '';
      const now = new Date();
      const diff = Math.round((now - d) / 1000); // seconds (positive means past)
      const abs = Math.abs(diff);
      if(abs < 60) return diff >= 0 ? `${abs}s ago` : `in ${abs}s`;
      const mins = Math.round(abs/60);
      if(mins < 60) return diff >= 0 ? `${mins}m ago` : `in ${mins}m`;
      const hrs = Math.round(mins/60);
      if(hrs < 24) return diff >= 0 ? `${hrs}h ago` : `in ${hrs}h`;
      const days = Math.round(hrs/24);
      if(days < 7) return diff >= 0 ? `${days}d ago` : `in ${days}d`;
      // fallback to local date for older
      return d.toLocaleString();
    }catch(e){ return ''; }
  }

  const displayItems = slice.map(it => {
    try{
      const copy = Object.assign({}, it);
      if(copy.ts !== undefined) copy._ts = tryFormatTs(copy.ts);
      else if(copy.timestamp !== undefined) copy._ts = tryFormatTs(copy.timestamp);
      // human-friendly local time and relative time
      try{
        const raw = copy.ts !== undefined ? copy.ts : (copy.timestamp !== undefined ? copy.timestamp : null);
        if(raw != null){
          const asNumber = (typeof raw === 'number') ? raw : (Number(raw) || NaN);
          const d = !isNaN(asNumber) ? new Date(asNumber*1000) : new Date(raw);
          if(!isNaN(d)){
            copy._local = d.toLocaleString();
            copy._rel = formatRelative(asNumber && !isNaN(asNumber) ? asNumber : raw);
          }
        }
      }catch(e){}
      return copy;
    }catch(e){ return it; }
  });

  const payload = { page, pageSize: ps, total, items: displayItems };
  lastRenderedItems = displayItems;
  lastPageStart = start;
  document.getElementById('out').textContent = JSON.stringify(payload, null, 2);
  document.getElementById('pageInfo').textContent = ` Showing ${total? start+1 : 0}-${end} of ${total} (Page ${page}/${maxPage})`;
  document.getElementById('prev').disabled = page<=1;
  document.getElementById('next').disabled = page>=maxPage;
  document.getElementById('goto').value = page;
}

document.getElementById('prev').addEventListener('click', ()=>{ if(page>1){page--; renderPage();}});
document.getElementById('next').addEventListener('click', ()=>{ page++; renderPage();});
document.getElementById('go').addEventListener('click', ()=>{ const v=parseInt(document.getElementById('goto').value||1,10); if(!isNaN(v)){ page=v; renderPage(); }});
document.addEventListener('keydown', (e)=>{ if(!jsonData) return; if(e.key==='ArrowLeft'){ if(page>1){page--; renderPage();}} else if(e.key==='ArrowRight'){ page++; renderPage(); }});

document.getElementById('copy').addEventListener('click', ()=>{
  try{ navigator.clipboard.writeText(document.getElementById('out').textContent); }catch(e){ alert('Copy failed'); }
});

document.getElementById('download').addEventListener('click', ()=>{
  const blob = new Blob([document.getElementById('out').textContent], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = `timeline-page-${page}.json`; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
});

document.getElementById('f').addEventListener('change', function(e){
  const file = e.target.files[0];
  if(!file) return;
  const r = new FileReader();
  r.onload = function(){
    try{ jsonData = JSON.parse(r.result); page=1; renderPage(); }catch(err){document.getElementById('out').textContent = 'Invalid JSON';}
  };
  r.readAsText(file);
});

// Table view support
let tableMode = false;
document.getElementById('toggleView').addEventListener('click', ()=>{
  tableMode = !tableMode;
  document.getElementById('tableWrap').style.display = tableMode ? 'block' : 'none';
  document.getElementById('out').style.display = tableMode ? 'none' : 'block';
  document.getElementById('toggleView').textContent = tableMode ? 'JSON View' : 'Table View';
  renderPage();
});

function renderTable(items){
  const wrap = document.getElementById('tableWrap');
  if(!items || items.length===0){ wrap.innerHTML = '<div class="muted">No items</div>'; return; }
  const cols = ['#','_local','_rel','event','msg'];
  let html = '<table style="border-collapse:collapse;width:100%"><thead><tr>' + cols.map(c=>`<th style="text-align:left;border-bottom:1px solid #ddd;padding:6px">${c}</th>`).join('') + '</tr></thead><tbody>';
  items.forEach((it,i)=>{
    const ev = it.event !== undefined ? it.event : '';
    const msg = it.msg !== undefined ? it.msg : (it.message !== undefined ? it.message : '');
    html += `<tr id="row-${i}"><td style="padding:6px;border-bottom:1px solid #f0f0f0">${i+1}</td><td style="padding:6px;border-bottom:1px solid #f0f0f0">${it._local||''}</td><td style="padding:6px;border-bottom:1px solid #f0f0f0">${it._rel||''}</td><td style="padding:6px;border-bottom:1px solid #f0f0f0">${ev}</td><td style="padding:6px;border-bottom:1px solid #f0f0f0">${msg}</td></tr>`;
  });
  html += '</tbody></table>';
  wrap.innerHTML = html;
}

// Filtering/highlighting implementation (supports global mode)
function buildHay(it){
  try{
    let hay = '';
    if(it.event && typeof it.event === 'object'){
      if(it.event.category) hay += ' ' + String(it.event.category);
      if(it.event.message) hay += ' ' + String(it.event.message);
      if(it.event.payload) hay += ' ' + JSON.stringify(it.event.payload);
    } else if(it.event){
      hay += ' ' + String(it.event);
    }
    if(it.message) hay += ' ' + String(it.message);
    if(it.msg) hay += ' ' + String(it.msg);
    if(it.payload) hay += ' ' + JSON.stringify(it.payload);
    if(it._local) hay += ' ' + String(it._local);
    if(it._rel) hay += ' ' + String(it._rel);
    return hay.toLowerCase();
  }catch(e){ return '' }
}

function applyFilter(){
  const filter = (document.getElementById('filterInput') && document.getElementById('filterInput').value || '').trim().toLowerCase();
  const globalMode = document.getElementById('globalFilter') && document.getElementById('globalFilter').checked;
  if(!tableMode){
    // highlighting only applies to table view
    return;
  }
  // no items rendered
  if(!lastRenderedItems || lastRenderedItems.length === 0) return;

  if(!filter){
    // clear highlights
    for(let i=0;i<lastRenderedItems.length;i++){
      const row = document.getElementById(`row-${i}`);
      if(row) row.classList.remove('highlight');
    }
    return;
  }

  if(globalMode){
    // scan fullTrace once to build match set of global indices
    const matchSet = new Set();
    for(let idx=0; idx<fullTrace.length; idx++){
      const it = fullTrace[idx];
      // build hay from original data augmented with computed _local/_rel if possible
      const copy = Object.assign({}, it);
      try{
        // derive _local/_rel if ts/timestamp present
        const raw = copy.ts !== undefined ? copy.ts : (copy.timestamp !== undefined ? copy.timestamp : null);
        if(raw != null){
          const asNumber = (typeof raw === 'number') ? raw : (Number(raw) || NaN);
          const d = !isNaN(asNumber) ? new Date(asNumber*1000) : new Date(raw);
          if(!isNaN(d)){
            copy._local = d.toLocaleString();
            // lightweight relative string
            const now = new Date();
            const diff = Math.round((now - d) / 1000);
            const abs = Math.abs(diff);
            if(abs < 60) copy._rel = diff >=0 ? `${abs}s ago` : `in ${abs}s`;
            else if(Math.round(abs/60) < 60) copy._rel = diff >=0 ? `${Math.round(abs/60)}m ago` : `in ${Math.round(abs/60)}m`;
            else copy._rel = d.toLocaleString();
          }
        }
      }catch(e){}
      const hay = buildHay(copy);
      if(hay.indexOf(filter) !== -1) matchSet.add(idx);
    }
    // apply highlights on current page rows where global index matches
    for(let i=0;i<lastRenderedItems.length;i++){
      const globalIdx = lastPageStart + i;
      const row = document.getElementById(`row-${i}`);
      if(!row) continue;
      if(matchSet.has(globalIdx)) row.classList.add('highlight'); else row.classList.remove('highlight');
    }
  }else{
    // page-local: build hay from lastRenderedItems
    for(let i=0;i<lastRenderedItems.length;i++){
      const it = lastRenderedItems[i];
      const row = document.getElementById(`row-${i}`);
      if(!row) continue;
      const hay = buildHay(it);
      if(hay.indexOf(filter) !== -1) row.classList.add('highlight'); else row.classList.remove('highlight');
    }
  }
}

// wire up filter input and global checkbox
const filterEl = document.getElementById('filterInput');
if(filterEl){ filterEl.addEventListener('keyup', ()=> applyFilter()); }
const globalEl = document.getElementById('globalFilter');
if(globalEl){ globalEl.addEventListener('change', ()=> applyFilter()); }

</script>
</body>
</html>
