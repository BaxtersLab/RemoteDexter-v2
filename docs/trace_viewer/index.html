<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Trace Viewer</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 16px; }
    .entry { border: 1px solid #ccc; padding: 8px; margin: 8px 0; }
    pre { background:#f7f7f7; padding:8px; overflow:auto }
  </style>
</head>
<body>
  <h1>Temporal Trace Viewer</h1>
  <input type="file" id="fileinput" accept="application/json" />
  <div id="container"></div>

  <script>
    document.getElementById('fileinput').addEventListener('change', function(evt){
      const f = evt.target.files[0];
      if(!f) return;
      const r = new FileReader();
      r.onload = function(e){
        try{
          const data = JSON.parse(e.target.result);
          render(data);
        }catch(err){
          document.getElementById('container').innerText = 'Invalid JSON';
        }
      };
      r.readAsText(f);
    });

    function render(trace){
      const c = document.getElementById('container');
      c.innerHTML = '';
      if(!Array.isArray(trace)){
        c.innerText = 'Expected an array of trace entries';
        return;
      }
      trace.forEach(function(t){
        const d = document.createElement('div'); d.className='entry';
        const h = document.createElement('div'); h.innerHTML = '<strong>Tick ' + t.tick + '</strong> @ ' + (t.timestamp||'');
        d.appendChild(h);
        const pre = document.createElement('pre'); pre.textContent = JSON.stringify(t, null, 2);
        d.appendChild(pre);
        c.appendChild(d);
      });
    }
  </script>
</body>
</html>
