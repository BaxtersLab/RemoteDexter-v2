name: Bootstrap verification (PR)

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

# Minimal permissions required by this workflow:
#   contents: read  – needed to checkout the repository and read source files
#   issues: write   – needed to post a PR comment with bootstrap diagnostics
#                     (GitHub treats PRs as issues for comment purposes)
#   checks: write   – needed to annotate check runs with build/test results
# Do NOT grant broader permissions (e.g. contents: write) in this workflow;
# if a step needs write access, add it explicitly and document why.
permissions:
  contents: read
  issues: write
  checks: write

jobs:
  verify-bootstrap:
    name: Verify pinned toolchain (bootstrap)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # Smoke-check: verify the workflow can perform basic read operations
      # before proceeding to write steps. This catches permission regressions
      # early (e.g. if the token scope is accidentally reduced).
      - name: Smoke-check read permissions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "[ci] smoke-check: verifying repository is readable"
          test -f build.gradle.kts || test -f build.gradle
          echo "[ci] smoke-check: passed"

      - name: Run bootstrap script and capture results
        id: bootstrap
        shell: pwsh
        continue-on-error: true
        run: |
          Write-Host "[ci] executing bootstrap script"
          $output = & pwsh -NoProfile -ExecutionPolicy Bypass -File ./scripts/bootstrap-dev.ps1 2>&1
          $code = $LASTEXITCODE
          $summary = $output -join "`n"
          if ($null -eq $summary) { $summary = "" }
          if ($summary.Length -gt 8000) { $summary = $summary.Substring($summary.Length - 8000) }
          $obj = @{ exitCode = $code; summary = $summary }
          $json = $obj | ConvertTo-Json -Depth 5
          Set-Content -Path bootstrap_result.json -Value $json -Encoding UTF8
          Add-Content -Path $env:GITHUB_OUTPUT -Value "exit_code=$code"

      # Requires `issues: write` permission.
      # Marked continue-on-error so a comment-posting failure does not block
      # the overall CI result – the artifact upload below preserves diagnostics.
      # github-token must be supplied explicitly to avoid "Resource not
      # accessible by integration" errors that occur when the token is omitted.
      - name: Post structured bootstrap diagnostics as PR comment
        uses: actions/github-script@v6
        continue-on-error: true
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = 'bootstrap_result.json';
            let body = '';
            try {
              const json = fs.readFileSync(path, 'utf8');
              body = '### Bootstrap verification result\n```json\n' + json + '\n```';
            } catch (e) {
              body = 'Bootstrap result file not found or unreadable.';
            }
            const issue_number = context.issue.number;
            await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number, body });

      - name: Upload bootstrap_result.json artifact
        uses: actions/upload-artifact@v4
        with:
          name: bootstrap-result
          path: bootstrap_result.json
          retention-days: 7

      - name: Fail if bootstrap failed
        if: steps.bootstrap.outputs.exit_code != '0'
        run: exit 1
