name: Repo Governance Monitor

on:
  schedule:
    - cron: '0 0 * * *' # daily at midnight UTC
  workflow_run:
    workflows:
      - 'Repo Governance Enforcement'
    types:
      - completed

jobs:
  check_recent_run:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - name: Check last governance workflow run
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const workflowName = 'Repo Governance Enforcement';
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const workflows = await github.rest.actions.listRepoWorkflows({ owner, repo });
            const wf = workflows.data.workflows.find(w => w.name === workflowName);
            if (!wf) {
              throw new Error(`Workflow '${workflowName}' not found`);
            }

            const runs = await github.rest.actions.listWorkflowRuns({ owner, repo, workflow_id: wf.id, per_page: 1 });
            const last = runs.data.workflow_runs[0];
            const now = Date.now();
            const ageMs = last ? (now - new Date(last.created_at).getTime()) : Infinity;
            const thresholdMs = 24 * 60 * 60 * 1000; // 24 hours

            if (!last || ageMs > thresholdMs) {
              const title = 'Alert: Repo Governance scan missing or stale';
              const body = `The '${workflowName}' workflow has no runs in the last 24 hours.\n\nQuery result: ${JSON.stringify(last || {})}`;
              const existing = await github.rest.issues.listForRepo({ owner, repo, state: 'open', per_page: 100 });
              if (!existing.data.some(i => i.title === title)) {
                await github.rest.issues.create({ owner, repo, title, body });
              }
              throw new Error('Governance workflow missing or stale');
            }

            if (last.conclusion !== 'success') {
              const title = `Alert: Repo Governance scan failed (${last.conclusion})`;
              const body = `Latest run (${last.html_url}) concluded with '${last.conclusion}'.`;
              const existing = await github.rest.issues.listForRepo({ owner, repo, state: 'open', per_page: 100 });
              if (!existing.data.some(i => i.title === title)) {
                await github.rest.issues.create({ owner, repo, title, body });
              }
              throw new Error('Governance workflow failed');
            }

            core.info('Governance workflow recent and successful.');

  notify_on_run:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_run'
    steps:
      - name: Notify on failed governance run
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const run = context.payload.workflow_run;
            if (!run) return;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            if (run.conclusion && run.conclusion !== 'success') {
              const title = `Alert: Repo Governance scan failed (${run.conclusion})`;
              const body = `A governance workflow run failed: ${run.html_url} with conclusion ${run.conclusion}.`;
              const existing = await github.rest.issues.listForRepo({ owner, repo, state: 'open', per_page: 100 });
              if (!existing.data.some(i => i.title === title)) {
                await github.rest.issues.create({ owner, repo, title, body });
              }
              throw new Error('Governance workflow failed');
            } else {
              core.info('Governance workflow run succeeded.');
            }
